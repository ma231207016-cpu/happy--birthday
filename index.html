<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bro 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #f5e6dc;
  color: #5a4a42;
  text-align: center;
  transition: 1s;
}

.container {
  max-width: 750px;
  margin: auto;
  padding: 60px 20px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #5a4a42;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

#text {
  margin-top: 30px;
  font-size: 18px;
  line-height: 1.8;
  min-height: 200px;
  text-align: left;
}

/* Heartbeat */
.heart {
  font-size: 70px;
  animation: beat 1s infinite;
  text-align: center;
}

@keyframes beat {
  0%,100% {transform: scale(1);}
  50% {transform: scale(1.2);}
}

/* Glow */
.glow {
  text-align: center;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {text-shadow: 0 0 10px #fff;}
  to {text-shadow: 0 0 25px #ffb6a3;}
}

/* Fireworks */
.fire {
  position: fixed;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  animation: boom 1s ease-out forwards;
}

@keyframes boom {
  to {
    transform: translate(var(--x), var(--y));
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>For My Bro 🤍</h1>

<button onclick="start()">Start 💌</button>

<div id="text"></div>

</div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>

let message = `You’re not just my best friend — you’re my peace, my comfort, and the one place I can always be myself without trying. Being with you feels easy, real, and right in every way. You understand me in ways no one else ever has, and that means more than I can explain.

You’ve been my strength when I felt weak, my light when things felt dark, and my reason to smile on days I didn’t want to. You’ve stood by me, lifted me up, and reminded me of who I am when I forgot.

All the memories we’ve made — the laughs, the late-night talks, the random moments that turn into the best ones — they mean everything to me. With you, even the simplest days feel special, and every second feels like something I’ll cherish forever.

You’re the one I can be completely honest with, the one who listens without judging, and the one who somehow always knows exactly what I need. You make me feel safe, valued, and truly understood.

I admire your strength, your kindness, and the way you care so deeply for the people you love. You inspire me more than you know, and you make me want to be a better person every day.

And I don’t just cherish what we have now — I dream about everything that’s still waiting for us. I can already imagine our future, where we’re both building our own lives, finding our partners, and still staying just as close.

I picture our kids growing up together, sharing the same kind of bond we have — creating their own memories while we sit together, watching them and smiling about how it all came full circle.

And of course, all the trips we’ve promised each other — the dream places we’ll explore, the late-night talks in new cities, the endless photos, and the laughter that will follow us wherever we go.

Thank you for your patience, for your constant support, and for never giving up on me — even when I’m at my worst. Thank you for choosing to stay, for choosing this friendship, and for choosing me.

I promise I’ll always be there for you — to listen, to support, to laugh, and to stand by you no matter what life brings.

You mean more to me than words can ever fully express.

I love you endlessly, my person 💕✨`;

let i = 0;

function start() {
  let pass = prompt("Hint: The way you call me 🤍");
  if (pass && pass.toLowerCase() === "bro") {
    document.getElementById("music").play();
    typeWriter();
  } else {
    alert("Try again 💔");
  }
}

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 20);
  } else {
    finalScene();
  }
}

function finalScene() {
  setTimeout(() => {
    document.body.style.background = "#000";
    document.body.style.color = "#fff";

    document.getElementById("text").innerHTML =
      "<div class='heart'>💖</div>" +
      "<h2 class='glow'>I love you endlessly, my person</h2>" +
      "<h1 class='glow'>Bro 💕</h1>" +
      "<h2>Happy Birthday 🎂</h2>";

    fireworks();
  }, 1000);
}

function fireworks() {
  setInterval(() => {
    for (let i = 0; i < 15; i++) {
      let f = document.createElement("div");
      f.className = "fire";

      f.style.left = Math.random() * 100 + "vw";
      f.style.top = Math.random() * 100 + "vh";

      f.style.setProperty("--x", (Math.random() - 0.5) * 200 + "px");
      f.style.setProperty("--y", (Math.random() - 0.5) * 200 + "px");

      f.style.background = `hsl(${Math.random()*360},100%,60%)`;

      document.body.appendChild(f);
      setTimeout(() => f.remove(), 1000);
    }
  }, 800);
}

</script>

</body>
</html>
