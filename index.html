<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Bro 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #f5e6dc, #f0d8cc);
  text-align: center;
  color: #5a4a42;
}

/* Sections */
section {
  padding: 60px 20px;
}

#secret {
  display: none;
}

/* Chat style */
.chat {
  max-width: 400px;
  margin: auto;
  text-align: left;
}

.msg {
  background: #fff;
  padding: 10px 15px;
  border-radius: 15px;
  margin: 10px 0;
  width: fit-content;
  animation: fadeIn 1s ease;
}

.me {
  background: #5a4a42;
  color: white;
  margin-left: auto;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* Button */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #5a4a42;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* Hearts */
.heart {
  position: fixed;
  color: pink;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<!-- MAIN -->
<section id="main">
  <h1>For My Bro 🤍</h1>
  <h2 id="name"></h2>

  <p>
    Enaku nee just best friend illa… nee enoda happiness 💖  
    Ready ah? I have something for you 😌
  </p>

  <button onclick="checkPassword()">Open Surprise 💌</button>
</section>

<!-- SECRET -->
<section id="secret">
  <h1>Only for You 🤍</h1>

  <div class="chat" id="chatBox"></div>

  <h2 id="finalMsg" style="display:none;">Happy Birthday 🎂💖</h2>
</section>

<!-- MUSIC -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>

/* NAME ANIMATION */
let text = "Bro 💕";
let i = 0;
function typeName() {
  if (i < text.length) {
    document.getElementById("name").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeName, 120);
  }
}
typeName();

/* PASSWORD */
function checkPassword() {
  let pass = prompt("Hint: The way you call me 🤍");

  if (pass && pass.toLowerCase() === "bro") {
    unlock();
  } else {
    alert("Wrong 😢 try again");
  }
}

/* UNLOCK */
function unlock() {
  document.getElementById("main").style.display = "none";
  document.getElementById("secret").style.display = "block";

  document.getElementById("music").play();

  startChat();
}

/* CHAT MESSAGES */
let messages = [
  "Hey bro… 🥺",
  "I wanted to tell you something…",
  "Nee enaku romba mukkiyam 💖",
  "Un kooda irundha moment ellam enaku special 🫶",
  "Sometimes naan solla maaten…",
  "But I care about you a lot 😌",
  "No matter what happens…",
  "Naan un kooda dhaan irupen 🤍",
  "You are my forever person 💕"
];

let index = 0;

function startChat() {
  let chatBox = document.getElementById("chatBox");

  let interval = setInterval(() => {
    if (index >= messages.length) {
      clearInterval(interval);
      document.getElementById("finalMsg").style.display = "block";
      return;
    }

    let msg = document.createElement("div");
    msg.classList.add("msg");

    if (index % 2 === 0) {
      msg.classList.add("me");
    }

    msg.innerText = messages[index];
    chatBox.appendChild(msg);

    index++;
  }, 1500);
}

/* HEARTS */
setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "💖";
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 20 + "px";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 5000);
}, 500);

</script>

</body>
</html>
