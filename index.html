<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Bestie 🤍</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            color: #4a4a4a;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fad0c4, #ffd1ff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px; text-align: center; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 95%;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3rem; color: #ff4d6d; margin-bottom: 20px; }
        
        /* Photo Styling */
        .photo-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; }
        .polaroid {
            background: white;
            padding: 10px 10px 25px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            width: 140px;
            border-radius: 5px;
        }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid img { width: 100%; height: 120px; object-fit: cover; border-radius: 2px; }

        .btn-next {
            margin-top: 20px;
            padding: 15px 35px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        .heart { position: fixed; font-size: 20px; user-select: none; pointer-events: none; z-index: 999; animation: moveHeart 4s linear forwards; }
        @keyframes moveHeart { to { transform: translateY(-100vh) translateX(20px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

<section class="section">
    <div class="glass-card">
        <h1>Hey Bro... 🤍</h1>
        <p id="type1" style="font-size: 1.2rem; min-height: 60px;"></p>
        <button class="btn-next" id="next1" style="display:none;" onclick="document.getElementById('memories').scrollIntoView({behavior:'smooth'})">See our memories 📸</button>
    </div>
</section>

<section class="section" id="memories">
    <div class="glass-card">
        <h2>Moments Together ✨</h2>
        <div class="photo-container">
            <div class="polaroid">
                <img src="https://via.placeholder.com/150" alt="Memory 1">
            </div>
            <div class="polaroid">
                <img src="https://via.placeholder.com/150" alt="Memory 2">
            </div>
            <div class="polaroid">
                <img src="https://via.placeholder.com/150" alt="Memory 3">
            </div>
        </div>
        <p>"A picture is worth a thousand words, but our memories are priceless."</p>
        <button class="btn-next" onclick="document.getElementById('surprise').scrollIntoView({behavior:'smooth'})">The Best Part... 🎁</button>
    </div>
</section>

<section class="section" id="surprise">
    <div class="glass-card">
        <h1>Happy Birthday! 🎉</h1>
        <p>I am so lucky to have a friend like you. Here is to many more years of laughing at nothing! 🥂</p>
        <button class="btn-next" onclick="celebrate()">TAP FOR MAGIC 🎊</button>
    </div>
</section>

<script>
    const text = "I wanted to make something special for you. Something that shows just how much our friendship means to me... are you ready?";
    let i = 0;
    function type() {
        if (i < text.length) {
            document.getElementById("type1").innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 50);
        } else { document.getElementById("next1").style.display = "inline-block"; }
    }
    window.onload = () => { type(); setInterval(createHeart, 500); };

    function celebrate() {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    }

    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = ['❤️', '✨', '🌸'][Math.floor(Math.random() * 3)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }
</script>
</body>
</html>
